<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | Burger King</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f1e8;
}

/* NAVBAR */

.navbar{
    height:80px;
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    border-bottom:1px solid #ddd;
}

.logo{
    width:70px;
}

.menu{
    display:flex;
    gap:25px;
}

.menu a{
    text-decoration:none;
    color:#502314;
    font-weight:600;
}

.menu a:hover{
    color:#d62300;
}

/* OVERLAY */

.cart-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;

    background:rgba(0,0,0,.55);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* POPUP */

.cart-popup{
    width:450px;
    background:#2c1c14;
    color:white;

    border-radius:20px;

    padding:30px;

    animation:popup .3s ease;
}

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.cart-popup h2{
    font-size:18px;
    margin-bottom:25px;
    color:#fff;
}

.cart-popup p{
    font-size:20px;
    margin-bottom:35px;
}

/* BUTTON */

.cart-popup button{
    float:right;

    border:none;

    background:#d62300;

    color:white;

    padding:12px 35px;

    border-radius:30px;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;
}

.cart-popup button:hover{
    background:#b51d00;
}

/* EMPTY CART */

.empty-cart{
    text-align:center;
    padding:100px 20px;
}

.empty-cart i{
    font-size:100px;
    color:#d62300;
    margin-bottom:20px;
}

.empty-cart h1{
    color:#502314;
    margin-bottom:10px;
}

.empty-cart p{
    color:#666;
}

/* MOBILE */

@media(max-width:500px){

    .cart-popup{
        width:90%;
    }

    .navbar{
        flex-direction:column;
        height:auto;
        padding:15px;
        gap:15px;
    }

    .menu{
        flex-wrap:wrap;
        justify-content:center;
    }

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<a href="index.html">

<img
src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Burger_King_logo_%281999%29.svg/512px-Burger_King_logo_%281999%29.svg.png"
class="logo">

</a>

<div class="menu">

<a href="index.html">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="store.html">
<i class="fa-solid fa-store"></i>
Stores
</a>

<a href="kingDeals.html">
<i class="fa-solid fa-tags"></i>
Deals
</a>

<a href="login.html">
<i class="fa-solid fa-user"></i>
Login
</a>

</div>

</nav>

<!-- EMPTY CART PAGE -->

<section class="empty-cart">

<i class="fa-solid fa-cart-shopping"></i>

<h1>Your Cart is Empty</h1>

<p>Add your favourite burgers and meals to get started.</p>

</section>

<!-- POPUP -->

<div class="cart-overlay" id="popup">

<div class="cart-popup">

<h2>burgerking.in says</h2>

<p>No items are added.</p>

<button onclick="closePopup()">
OK
</button>

</div>

</div>

<script>

function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>p
