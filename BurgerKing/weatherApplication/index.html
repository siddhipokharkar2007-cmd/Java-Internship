<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:linear-gradient(135deg,#667eea,#764ba2);

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;

            transition:.5s;

        }


        .weather-card{

            width:100%;

            max-width:470px;

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(20px);

            -webkit-backdrop-filter:blur(20px);

            border-radius:30px;

            padding:30px;

            color:white;

            box-shadow:0 10px 40px rgba(0,0,0,.25);

            transition:.4s;

        }


        .weather-card:hover{

            transform:translateY(-10px);

        }



        h1{

            text-align:center;

            font-weight:700;

            margin-bottom:15px;

        }


        .dateTime{

            text-align:center;

            opacity:.85;

            margin-bottom:20px;

        }



        .darkBtn{

            float:right;

            width:45px;

            height:45px;

            border:none;

            border-radius:50%;

            background:white;

            font-size:20px;

            cursor:pointer;

            transition:.3s;

        }


        .darkBtn:hover{

            transform:scale(1.1);

        }



        .form-control{

            height:55px;

            border-radius:20px;

            border:none;

        }


        .form-control:focus{

            box-shadow:none;

        }



        .btn-search,

        .btn-location{

            width:100%;

            height:50px;

            border:none;

            border-radius:25px;

            margin-top:15px;

            font-weight:600;

        }


        .btn-search{

            background:white;

            color:#5b4dd8;

        }


        .btn-location{

            background:#ffd43b;

            color:black;

        }



        #dataResult{

            margin-top:25px;

        }



        .city{

            text-align:center;

            font-size:30px;

            font-weight:bold;

        }



        .country{

            text-align:center;

            opacity:.8;

        }



        .weather-icon{

            text-align:center;

        }


        .weather-icon img{

            width:130px;

        }



        .temp{

            text-align:center;

            font-size:65px;

            font-weight:bold;

        }



        .condition{

            text-align:center;

            font-size:24px;

        }


        .description{

            text-align:center;

            opacity:.8;

            text-transform:capitalize;

        }



        .extra{

            display:flex;

            gap:10px;

            margin-top:25px;

        }



        .extra-box{

            flex:1;

            background:rgba(255,255,255,.12);

            padding:15px;

            border-radius:20px;

            text-align:center;

            transition:.3s;

        }



        .extra-box:hover{

            transform:translateY(-8px);

            background:rgba(255,255,255,.22);

        }



        .forecast{

            margin-top:30px;

        }



        .forecast h4{

            text-align:center;

            margin-bottom:15px;

        }



        .forecast-row{

            display:flex;

            gap:10px;

            overflow-x:auto;

        }



        .forecast-row::-webkit-scrollbar{

            display:none;

        }



        .forecast-card{

            min-width:95px;

            background:rgba(255,255,255,.12);

            border-radius:20px;

            text-align:center;

            padding:12px;

            transition:.3s;

        }



        .forecast-card:hover{

            transform:translateY(-8px);

            background:rgba(255,255,255,.25);

        }



        .history{

            margin-top:25px;

        }



        .history h5{

            margin-bottom:10px;

        }



        .history button{

            margin:5px;

            border-radius:20px;

        }



        .dark{

            background:

            linear-gradient(

            135deg,

            #0f2027,

            #203a43,

            #2c5364

            );

        }



        .sunny{

            background:

            linear-gradient(

            135deg,

            #f6d365,

            #fda085

            );

        }



        .rainy{

            background:

            linear-gradient(

            135deg,

            #4b79a1,

            #283e51

            );

        }



        .cloudy{

            background:

            linear-gradient(

            135deg,

            #bdc3c7,

            #2c3e50

            );

        }



        .snowy{

            background:

            linear-gradient(

            135deg,

            #83a4d4,

            #b6fbff

            );

        }



        @media(max-width:500px){

            .extra{

                flex-direction:column;

            }


            .temp{

                font-size:50px;

            }

        }

    </style>

</head>

<body>

<div class="weather-card">

<button class="darkBtn"

onclick="toggleTheme()">

🌙

</button>


<h1>

🌤 Weather App

</h1>


<div class="dateTime"

id="dateTime">

</div>



<div class="form-floating">

<input

type="text"

class="form-control"

id="cityInput"

placeholder="City Name">


<label>

Enter City Name

</label>

</div>



<button

class="btn-search"

onclick="getWeatherData()">

🔍 Search

</button>



<button

class="btn-location"

onclick="getLocationWeather()">

📍 Current Location

</button>



<div id="dataResult">

</div>



<div class="forecast">

<h4>

📅 5 Days Forecast

</h4>


<div

class="forecast-row"

id="forecast">

</div>

</div>



<div class="history">

<h5>

Recent Searches

</h5>


<div id="history">

</div>

</div>


</div>


<script src="script.js"></script>

</body>

</html>
